name: Restore cached Idris2 build
description: >-
  Prepare pack for a build variant produced by the build-and-test workflow and
  restore that variant's `.build` from the GitHub Actions cache. Drop into a
  custom job, then run your own `pack test`/`pack run` against the cached build.

inputs:
  mode:
    description: Variant mode from the workflow's `cache_keys` output (`latest-pack-collection` or `bleeding-edge-compiler`).
    required: true
  cache_key:
    description: Variant cache key from the workflow's `cache_keys` output.
    required: true
  project_dir:
    description: Directory holding the .ipkg and pack.toml (the `project_dir` workflow output).
    required: false
    default: .
  build_dir:
    description: The package's build dir (the `build_dir` workflow output). Override if the .ipkg sets `builddir`.
    required: false
    default: build

outputs:
  cache-hit:
    description: "'true' when the build cache was restored."
    value: ${{ steps.cache.outputs.cache-hit }}

runs:
  using: composite
  steps:
    - name: Update pack database
      shell: bash
      working-directory: ${{ inputs.project_dir }}
      run: pack update-db

    - name: Recreate the bleeding-edge compiler
      if: inputs.mode == 'bleeding-edge-compiler'
      shell: bash
      working-directory: ${{ inputs.project_dir }}
      run: |
        { echo; echo "[idris2]"; echo 'commit = "latest:main"'; } >> pack.toml
        pack fetch

    - name: Switch collection
      shell: bash
      working-directory: ${{ inputs.project_dir }}
      run: pack switch ${{ inputs.mode == 'bleeding-edge-compiler' && 'HEAD' || 'latest' }}

    - name: Restore the build cache
      id: cache
      uses: actions/cache/restore@v5
      with:
        path: ${{ inputs.project_dir }}/${{ inputs.build_dir }}
        key: ${{ inputs.cache_key }}

    - name: Refresh cached file timestamps
      if: steps.cache.outputs.cache-hit == 'true'
      shell: bash
      working-directory: ${{ inputs.project_dir }}
      env:
        BUILD_DIR: ${{ inputs.build_dir }}
      run: find "$BUILD_DIR" -type f -exec touch {} + && sync
